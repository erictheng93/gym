name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Frontend Tests
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Run linter
        run: |
          cd frontend
          bun run lint

      - name: Run type check
        run: |
          cd frontend
          bun run typecheck

      - name: Run tests with coverage
        run: |
          cd frontend
          bun run test --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./frontend/coverage
          flags: frontend
          fail_ci_if_error: false

  # ============================================
  # Frontend Build
  # ============================================
  frontend-build:
    name: Frontend Build
    needs: frontend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Build all apps
        run: |
          cd frontend
          bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/apps/member-app/.output
            frontend/apps/admin-web/.output
          retention-days: 7

  # ============================================
  # Backend Docker Build
  # ============================================
  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: gym-nexus-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # E2E Tests (PR only)
  # ============================================
  e2e-test:
    name: E2E Tests
    if: github.event_name == 'pull_request'
    needs: [frontend-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd frontend
          bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd frontend
          bun run test:e2e
        env:
          # E2E test environment variables
          TEST_MEMBER_EMAIL: ${{ secrets.TEST_MEMBER_EMAIL }}
          TEST_MEMBER_PASSWORD: ${{ secrets.TEST_MEMBER_PASSWORD }}

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
