<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3"/>
      <stop offset="100%" style="stop-color:#00c7ff"/>
    </linearGradient>
  </defs>
  <!-- Full background for maskable (no rounded corners, icon centered in safe zone) -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <!-- Dumbbell Icon (scaled down 20% for safe zone) -->
  <g fill="#ffffff" transform="translate(51.2, 51.2) scale(0.8)">
    <!-- Left weight -->
    <rect x="96" y="192" width="48" height="128" rx="8"/>
    <rect x="112" y="168" width="16" height="176" rx="4"/>
    <!-- Bar -->
    <rect x="144" y="240" width="224" height="32" rx="4"/>
    <!-- Right weight -->
    <rect x="368" y="192" width="48" height="128" rx="8"/>
    <rect x="384" y="168" width="16" height="176" rx="4"/>
  </g>
</svg>
