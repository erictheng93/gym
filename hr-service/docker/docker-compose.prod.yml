# HR Service Docker Compose - Production
# For production deployment with Gym Nexus

version: '3.8'

services:
  # ============================================
  # HR API Service (Production)
  # ============================================
  hr-api:
    image: gym-nexus/hr-service:latest
    container_name: hr-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${HR_DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MAIN_SYSTEM_API_URL=${MAIN_SYSTEM_API_URL}
      - MAIN_SYSTEM_API_KEY=${MAIN_SYSTEM_API_KEY}
      - SYNC_ENABLED=true
      - SYNC_INTERVAL_MINUTES=15
      - SYNC_WEBHOOK_SECRET=${SYNC_WEBHOOK_SECRET}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=200
      - LOG_LEVEL=warn
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - gym-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PostgreSQL Database (Production)
  # ============================================
  hr-postgres:
    image: postgres:18-alpine
    container_name: hr-postgres
    restart: always
    environment:
      - POSTGRES_USER=${HR_DB_USER}
      - POSTGRES_PASSWORD=${HR_DB_PASSWORD}
      - POSTGRES_DB=hr_db
    volumes:
      - hr_postgres_data_prod:/var/lib/postgresql/data
    networks:
      - gym-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HR_DB_USER} -d hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  gym-network:
    external: true

volumes:
  hr_postgres_data_prod:
    driver: local
