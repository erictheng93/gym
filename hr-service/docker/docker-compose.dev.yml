# HR Service Docker Compose - Development
# For local development with hot reloading

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database (Development)
  # ============================================
  postgres:
    image: postgres:18-alpine
    container_name: hr-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=hr_user
      - POSTGRES_PASSWORD=hr_password
      - POSTGRES_DB=hr_db
    volumes:
      - hr_postgres_data_dev:/var/lib/postgresql/data
    networks:
      - hr-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  hr-network-dev:
    driver: bridge

volumes:
  hr_postgres_data_dev:
    driver: local
