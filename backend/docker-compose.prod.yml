# Docker Compose Production Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file contains production-specific overrides for the base docker-compose.yml
# All sensitive values should be set via environment variables or .env file
#
# 域名: gym.imfinethankyouandyou.com
# API: api.gym.imfinethankyouandyou.com
#
# ============================================
# Volume Strategy (Production)
# ============================================
# - db_data: Named volume for PostgreSQL (better performance, Docker-managed)
# - directus_uploads: Named volume for user uploads (portable, easy backup)
# - extensions: Keep bind mount for easy deployment updates
#
# 資料遷移指南 (從 bind mount 轉換):
#   1. 停止服務: docker-compose down
#   2. 備份現有資料:
#      - cp -r ./data/database ./data/database.backup
#      - cp -r ./uploads ./uploads.backup
#   3. 啟動新服務建立 named volumes:
#      - docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   4. 複製資料到 named volumes:
#      - docker cp ./data/database.backup/. $(docker-compose ps -q database):/var/lib/postgresql/data/
#      - docker cp ./uploads.backup/. $(docker-compose ps -q directus):/directus/uploads/
#   5. 重啟服務: docker-compose restart

services:
  # ============================================
  # Cloudflare Tunnel (Zero Trust)
  # ============================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      directus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
  # ============================================
  # PostgreSQL Production Configuration
  # ============================================
  database:
    restart: always
    # 生產環境不暴露端口 (透過 Cloudflare Tunnel)
    ports: []
    # 使用 Named Volume 取代 Bind Mount (生產環境)
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: "${DB_USER:-directus}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"   # Required in production
      POSTGRES_DB: "${DB_DATABASE:-gym_nexus}"
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"               # Increased for production
      - "-c"
      - "shared_buffers=512MB"              # Increased shared buffers
      - "-c"
      - "effective_cache_size=2GB"          # Increased cache size
      - "-c"
      - "work_mem=32MB"                     # Increased work memory
      - "-c"
      - "maintenance_work_mem=256MB"        # Increased maintenance memory
      - "-c"
      - "random_page_cost=1.1"              # SSD optimization
      - "-c"
      - "effective_io_concurrency=200"      # SSD parallel IO
      - "-c"
      - "idle_in_transaction_session_timeout=30000"
      - "-c"
      - "statement_timeout=120000"          # 2 min timeout in production
      - "-c"
      - "lock_timeout=10000"
      - "-c"
      - "log_min_duration_statement=1000"   # Log slow queries (>1s)
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================
  # Directus Production Configuration
  # ============================================
  directus:
    # Build from production Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    # 生產環境不暴露端口 (透過 Cloudflare Tunnel)
    ports: []
    # 使用 Named Volume 取代 Bind Mount (生產環境)
    # extensions 保持 bind mount 方便部署時更新
    volumes:
      - directus_uploads:/directus/uploads
      - ./extensions:/directus/extensions
    environment:
      # Public URL for Directus (used for OAuth callbacks, etc.)
      PUBLIC_URL: "https://api.gym.imfinethankyouandyou.com"
      # Security - REQUIRED in production
      SECRET: "${SECRET}"                    # Must be set

      # Database connection
      DB_USER: "${DB_USER:-directus}"
      DB_PASSWORD: "${DB_PASSWORD}"          # Must be set
      DB_POOL__MIN: "5"                      # Higher minimum pool
      DB_POOL__MAX: "100"                    # Higher maximum pool

      # Cache - 使用內存緩存（單實例足夠，未來需要時再升級 Redis）
      CACHE_STORE: "memory"

      # Production logging
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_STYLE: "raw"                       # JSON logging for production

      # Rate limiting - 使用內存（單實例足夠）
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: "memory"
      RATE_LIMITER_POINTS: "100"
      RATE_LIMITER_DURATION: "60"

      # Disable admin account creation
      ADMIN_EMAIL: ""
      ADMIN_PASSWORD: ""

      # Security headers
      CONTENT_SECURITY_POLICY_DIRECTIVES__FRAME_ANCESTORS: "array:'self'"

      # Production performance
      CACHE_TTL: "10m"                       # Longer cache in production

      # CORS - Must be explicitly configured
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${CORS_ORIGIN}"          # Required - no default
      CORS_CREDENTIALS: "true"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Production health check with longer intervals
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/gym/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ============================================
# Named Volumes (生產環境)
# ============================================
# 優點:
#   - Docker 管理，可攜性高
#   - 效能較佳（尤其 Mac/Windows）
#   - 標準化備份流程
#
# 備份指令:
#   docker run --rm -v gym_db_data:/data -v $(pwd):/backup alpine tar czf /backup/db_backup.tar.gz /data
#   docker run --rm -v gym_directus_uploads:/data -v $(pwd):/backup alpine tar czf /backup/uploads_backup.tar.gz /data
#
# 還原指令:
#   docker run --rm -v gym_db_data:/data -v $(pwd):/backup alpine tar xzf /backup/db_backup.tar.gz -C /
#   docker run --rm -v gym_directus_uploads:/data -v $(pwd):/backup alpine tar xzf /backup/uploads_backup.tar.gz -C /
volumes:
  db_data:
    driver: local
    name: gym_db_data
  directus_uploads:
    driver: local
    name: gym_directus_uploads
