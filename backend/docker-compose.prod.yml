# =============================================================================
# Gym Nexus API v2 - Production Overrides
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ===========================================================================
  # API Production Settings
  # ===========================================================================
  api:
    restart: always
    environment:
      NODE_ENV: production
      # CORS for Cloudflare Pages domains
      CORS_ORIGIN: "https://admin.imfinethankyouandyou.com,https://app.imfinethankyouandyou.com,https://coach.imfinethankyouandyou.com"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # Database Production Settings
  # ===========================================================================
  database:
    restart: always
    # Production: Do NOT expose port externally
    ports: !override []
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ===========================================================================
  # Cloudflare Tunnel (API Only)
  # ===========================================================================
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
