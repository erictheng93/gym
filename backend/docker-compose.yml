services:
  # ============================================
  # Redis 緩存服務 (第二階段優化)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6333:6379"
    volumes:
      - ./data/redis:/data
    command:
      - "redis-server"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"           # LRU 淘汰策略
      - "--appendonly"
      - "yes"                   # 持久化
      - "--tcp-keepalive"
      - "60"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    # 使用 PostGIS 映像以支援地理空間查詢 (PostgreSQL 17 + PostGIS 3.4)
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    ports:
      - 15432:5432
    volumes:
      - ./data/database:/var/lib/postgresql
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
      POSTGRES_DB: gym_nexus
      # UTF-8 編碼設定 (防止中文亂碼)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    # 生產環境連接池優化參數
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"           # 擴展最大連接數 (原 100)
      - "-c"
      - "shared_buffers=256MB"          # 共享緩衝區
      - "-c"
      - "effective_cache_size=1GB"      # 預期可用記憶體
      - "-c"
      - "work_mem=16MB"                 # 每個查詢的工作記憶體
      - "-c"
      - "maintenance_work_mem=128MB"    # 維護操作記憶體
      - "-c"
      - "random_page_cost=1.1"          # SSD 優化
      - "-c"
      - "effective_io_concurrency=200"  # SSD 並行 IO
      - "-c"
      - "idle_in_transaction_session_timeout=30000"  # 30 秒空閒事務超時
      - "-c"
      - "statement_timeout=60000"       # 60 秒查詢超時
      - "-c"
      - "lock_timeout=10000"            # 10 秒鎖等待超時
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d gym_nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    build:
      context: .
      dockerfile: Dockerfile.directus
    image: gym-directus:11
    restart: unless-stopped
    ports:
      - "8500:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET: "replace-with-secure-random-string"
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: gym_nexus
      DB_USER: directus
      DB_PASSWORD: directus
      # UTF-8 客戶端編碼 (防止中文亂碼)
      DB_CHARSET: "utf8"
      # 連接池優化配置 (Directus 11 支援的選項)
      DB_POOL__MIN: "2"                   # 最小連接數
      DB_POOL__MAX: "50"                  # 最大連接數
      # ============================================
      # Redis 緩存配置 (第二階段優化)
      # ============================================
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"                # 使用 Redis 作為緩存存儲
      CACHE_REDIS: "redis://redis:6379"   # Redis 連接字串
      CACHE_TTL: "5m"                     # 預設緩存 5 分鐘
      CACHE_AUTO_PURGE: "true"            # 自動清除過期緩存
      CACHE_NAMESPACE: "gym"              # 緩存命名空間
      # Redis 環境變數 (供 Hooks 使用)
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # 效能優化
      RATE_LIMITER_ENABLED: "false"       # 開發環境關閉限流
      # 基礎配置
      ADMIN_EMAIL: admin@gym.com
      ADMIN_PASSWORD: admin
      WEBSOCKETS_ENABLED: "true"
      # Session Cookie Configuration (for cross-origin development)
      SESSION_COOKIE_SAME_SITE: "lax"
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_DOMAIN: "localhost"
      # CORS Configuration (externalized for production)
      CORS_ENABLED: "${CORS_ENABLED:-true}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:3005,http://localhost:3006,http://localhost:3007,http://localhost:3008,http://localhost:3009,http://localhost:3010}"
      CORS_CREDENTIALS: "${CORS_CREDENTIALS:-true}"
      CORS_ALLOWED_HEADERS: "${CORS_ALLOWED_HEADERS:-Content-Type,Authorization,X-Member-Token}"

      # ============================================
      # OAuth / SSO Authentication Providers
      # ============================================
      # Enabled providers (comma-separated)
      # 設定環境變數 AUTH_PROVIDERS=google,line,apple 來啟用
      AUTH_PROVIDERS: "${AUTH_PROVIDERS:-}"

      # Member role for OAuth users (created in migration 011)
      MEMBER_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # --- Google (OpenID Connect) ---
      AUTH_GOOGLE_DRIVER: "openid"
      AUTH_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      AUTH_GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      AUTH_GOOGLE_ISSUER_URL: "https://accounts.google.com/.well-known/openid-configuration"
      AUTH_GOOGLE_IDENTIFIER_KEY: "email"
      AUTH_GOOGLE_ICON: "google"
      AUTH_GOOGLE_LABEL: "Google"
      AUTH_GOOGLE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_GOOGLE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # --- LINE (OAuth 2.0 - Generic Driver) ---
      AUTH_LINE_DRIVER: "oauth2"
      AUTH_LINE_CLIENT_ID: "${LINE_CHANNEL_ID:-}"
      AUTH_LINE_CLIENT_SECRET: "${LINE_CHANNEL_SECRET:-}"
      AUTH_LINE_AUTHORIZE_URL: "https://access.line.me/oauth2/v2.1/authorize"
      AUTH_LINE_ACCESS_URL: "https://api.line.me/oauth2/v2.1/token"
      AUTH_LINE_PROFILE_URL: "https://api.line.me/v2/profile"
      AUTH_LINE_SCOPE: "profile openid email"
      AUTH_LINE_IDENTIFIER_KEY: "email"
      AUTH_LINE_ICON: "chat"
      AUTH_LINE_LABEL: "LINE"
      AUTH_LINE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_LINE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # --- Apple (OpenID Connect) ---
      AUTH_APPLE_DRIVER: "openid"
      AUTH_APPLE_CLIENT_ID: "${APPLE_CLIENT_ID:-}"
      AUTH_APPLE_CLIENT_SECRET: "${APPLE_CLIENT_SECRET:-}"
      AUTH_APPLE_ISSUER_URL: "https://appleid.apple.com/.well-known/openid-configuration"
      AUTH_APPLE_SCOPE: "name email"
      AUTH_APPLE_IDENTIFIER_KEY: "email"
      AUTH_APPLE_ICON: "apple"
      AUTH_APPLE_LABEL: "Apple"
      AUTH_APPLE_PARAMS: '{"response_mode":"form_post"}'
      AUTH_APPLE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_APPLE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # --- Facebook (OAuth 2.0) - 可選，需要時啟用 ---
      # AUTH_FACEBOOK_DRIVER: "oauth2"
      # AUTH_FACEBOOK_CLIENT_ID: "${FACEBOOK_CLIENT_ID:-}"
      # AUTH_FACEBOOK_CLIENT_SECRET: "${FACEBOOK_CLIENT_SECRET:-}"
      # AUTH_FACEBOOK_AUTHORIZE_URL: "https://www.facebook.com/dialog/oauth"
      # AUTH_FACEBOOK_ACCESS_URL: "https://graph.facebook.com/oauth/access_token"
      # AUTH_FACEBOOK_PROFILE_URL: "https://graph.facebook.com/me?fields=id,email,name,picture"
      # AUTH_FACEBOOK_IDENTIFIER_KEY: "email"
      # AUTH_FACEBOOK_ICON: "facebook"
      # AUTH_FACEBOOK_LABEL: "Facebook"
      # AUTH_FACEBOOK_ALLOW_PUBLIC_REGISTRATION: "true"
      # AUTH_FACEBOOK_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # ============================================
      # Email Configuration (Amazon SES SMTP)
      # ============================================
      # See backend/.env.example for setup instructions
      EMAIL_TRANSPORT: "${EMAIL_TRANSPORT:-smtp}"
      EMAIL_FROM: "${EMAIL_FROM:-Gym Nexus <noreply@gym-nexus.com>}"
      EMAIL_SMTP_HOST: "${EMAIL_SMTP_HOST:-email-smtp.ap-northeast-1.amazonaws.com}"
      EMAIL_SMTP_PORT: "${EMAIL_SMTP_PORT:-587}"
      EMAIL_SMTP_USER: "${EMAIL_SMTP_USER:-}"
      EMAIL_SMTP_PASSWORD: "${EMAIL_SMTP_PASSWORD:-}"
      EMAIL_SMTP_SECURE: "${EMAIL_SMTP_SECURE:-false}"
      EMAIL_SMTP_IGNORE_TLS: "${EMAIL_SMTP_IGNORE_TLS:-false}"

      # ============================================
      # Push Notification (VAPID for Web Push)
      # ============================================
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@gym-nexus.com}"

      # ============================================
      # LINE Messaging API (Notifications)
      # ============================================
      # Separate from LINE Login - for sending push notifications
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN:-}"
      LINE_MESSAGING_CHANNEL_SECRET: "${LINE_MESSAGING_CHANNEL_SECRET:-}"

      # ============================================
      # SMS Gateway (Mitake 三竹簡訊)
      # ============================================
      MITAKE_USERNAME: "${MITAKE_USERNAME:-}"
      MITAKE_PASSWORD: "${MITAKE_PASSWORD:-}"
      MITAKE_API_URL: "${MITAKE_API_URL:-https://smsapi.mitake.com.tw/api/mtk/SmSend}"
      MITAKE_COST_PER_SMS: "${MITAKE_COST_PER_SMS:-0.5}"
      SMS_DAILY_LIMIT_PER_MEMBER: "${SMS_DAILY_LIMIT_PER_MEMBER:-5}"
      SMS_OTP_ONLY: "${SMS_OTP_ONLY:-false}"
