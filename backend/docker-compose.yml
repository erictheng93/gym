# ============================================
# Gym Nexus - Docker Compose
# ============================================
# 使用方式: make up 或 docker-compose up -d

services:
  # ============================================
  # PostgreSQL + PostGIS
  # ============================================
  database:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      POSTGRES_USER: "${DB_USER:-directus}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-directus}"
      POSTGRES_DB: "${DB_DATABASE:-gym_nexus}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "idle_in_transaction_session_timeout=30000"
      - "-c"
      - "statement_timeout=120000"
      - "-c"
      - "lock_timeout=10000"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-directus} -d ${DB_DATABASE:-gym_nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  # ============================================
  # Directus CMS
  # ============================================
  directus:
    build:
      context: .
      dockerfile: Dockerfile.directus
    image: gym-directus:11
    restart: unless-stopped
    ports:
      - "${DIRECTUS_PORT:-8055}:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
    environment:
      SECRET: "${SECRET:-replace-with-secure-random-string}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8055}"

      # Database
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-gym_nexus}"
      DB_USER: "${DB_USER:-directus}"
      DB_PASSWORD: "${DB_PASSWORD:-directus}"
      DB_CHARSET: "utf8"
      DB_POOL__MIN: "5"
      DB_POOL__MAX: "100"

      # Cache
      CACHE_ENABLED: "true"
      CACHE_STORE: "memory"
      CACHE_TTL: "${CACHE_TTL:-10m}"
      CACHE_AUTO_PURGE: "true"

      # Rate Limiting
      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: "memory"
      RATE_LIMITER_POINTS: "100"
      RATE_LIMITER_DURATION: "60"

      # Logging
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_STYLE: "${LOG_STYLE:-raw}"

      # Admin
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@gym.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"

      # Session
      WEBSOCKETS_ENABLED: "true"
      SESSION_COOKIE_SAME_SITE: "${SESSION_COOKIE_SAME_SITE:-lax}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-false}"
      SESSION_COOKIE_DOMAIN: "${SESSION_COOKIE_DOMAIN:-}"

      # CORS
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      CORS_CREDENTIALS: "true"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization,X-Member-Token"

      # OAuth
      AUTH_PROVIDERS: "${AUTH_PROVIDERS:-}"
      MEMBER_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      AUTH_GOOGLE_DRIVER: "openid"
      AUTH_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      AUTH_GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      AUTH_GOOGLE_ISSUER_URL: "https://accounts.google.com/.well-known/openid-configuration"
      AUTH_GOOGLE_IDENTIFIER_KEY: "email"
      AUTH_GOOGLE_ICON: "google"
      AUTH_GOOGLE_LABEL: "Google"
      AUTH_GOOGLE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_GOOGLE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      AUTH_LINE_DRIVER: "oauth2"
      AUTH_LINE_CLIENT_ID: "${LINE_CHANNEL_ID:-}"
      AUTH_LINE_CLIENT_SECRET: "${LINE_CHANNEL_SECRET:-}"
      AUTH_LINE_AUTHORIZE_URL: "https://access.line.me/oauth2/v2.1/authorize"
      AUTH_LINE_ACCESS_URL: "https://api.line.me/oauth2/v2.1/token"
      AUTH_LINE_PROFILE_URL: "https://api.line.me/v2/profile"
      AUTH_LINE_SCOPE: "profile openid email"
      AUTH_LINE_IDENTIFIER_KEY: "email"
      AUTH_LINE_ICON: "chat"
      AUTH_LINE_LABEL: "LINE"
      AUTH_LINE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_LINE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      AUTH_APPLE_DRIVER: "openid"
      AUTH_APPLE_CLIENT_ID: "${APPLE_CLIENT_ID:-}"
      AUTH_APPLE_CLIENT_SECRET: "${APPLE_CLIENT_SECRET:-}"
      AUTH_APPLE_ISSUER_URL: "https://appleid.apple.com/.well-known/openid-configuration"
      AUTH_APPLE_SCOPE: "name email"
      AUTH_APPLE_IDENTIFIER_KEY: "email"
      AUTH_APPLE_ICON: "apple"
      AUTH_APPLE_LABEL: "Apple"
      AUTH_APPLE_PARAMS: '{"response_mode":"form_post"}'
      AUTH_APPLE_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_APPLE_DEFAULT_ROLE_ID: "${MEMBER_ROLE_ID:-b1000000-0000-0000-0000-000000000001}"

      # Email
      EMAIL_TRANSPORT: "${EMAIL_TRANSPORT:-smtp}"
      EMAIL_FROM: "${EMAIL_FROM:-Gym Nexus <noreply@gym-nexus.com>}"
      EMAIL_SMTP_HOST: "${EMAIL_SMTP_HOST:-email-smtp.ap-northeast-1.amazonaws.com}"
      EMAIL_SMTP_PORT: "${EMAIL_SMTP_PORT:-587}"
      EMAIL_SMTP_USER: "${EMAIL_SMTP_USER:-}"
      EMAIL_SMTP_PASSWORD: "${EMAIL_SMTP_PASSWORD:-}"
      EMAIL_SMTP_SECURE: "${EMAIL_SMTP_SECURE:-false}"
      EMAIL_SMTP_IGNORE_TLS: "${EMAIL_SMTP_IGNORE_TLS:-false}"

      # Push Notification
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@gym-nexus.com}"

      # LINE Messaging
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN:-}"
      LINE_MESSAGING_CHANNEL_SECRET: "${LINE_MESSAGING_CHANNEL_SECRET:-}"

      # SMS
      MITAKE_USERNAME: "${MITAKE_USERNAME:-}"
      MITAKE_PASSWORD: "${MITAKE_PASSWORD:-}"
      MITAKE_API_URL: "${MITAKE_API_URL:-https://smsapi.mitake.com.tw/api/mtk/SmSend}"
      MITAKE_COST_PER_SMS: "${MITAKE_COST_PER_SMS:-0.5}"
      SMS_DAILY_LIMIT_PER_MEMBER: "${SMS_DAILY_LIMIT_PER_MEMBER:-5}"
      SMS_OTP_ONLY: "${SMS_OTP_ONLY:-false}"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/gym/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Cloudflare Tunnel
  # ============================================
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      directus:
        condition: service_healthy

# ============================================
# Named Volumes
# ============================================
volumes:
  db_data:
    driver: local
    name: gym_db_data
  directus_uploads:
    driver: local
    name: gym_directus_uploads
